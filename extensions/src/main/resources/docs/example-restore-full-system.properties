################################################################################
#
# Pentaho Import-Export Configuration
# Sample: Full System Restore
#
# Use with: ./import-export-enhanced.sh --config example-restore-full-system.properties
#
# Or create at: ~/.pentaho-backup/restore-full.properties
#
################################################################################

# ============================================================================
# CONNECTION SETTINGS (Required)
# ============================================================================

# Pentaho Server URL (target server to restore INTO)
# Examples:
#   Local: http://localhost:8080/pentaho
#   HTTPS: https://pentaho.company.com:8443/pentaho
#   Remote: http://192.168.1.100:8080/pentaho
#
# IMPORTANT: This is the SERVER YOU'RE RESTORING TO, not the backup source!
url=http://localhost:8080/pentaho

# Administrative username (for target server)
# Note: Must have backup/restore permissions on target
username=admin

# Administrative password (for target server)
# SECURITY: Consider using environment variable instead:
#   export PENTAHO_PASSWORD=your_password
#   Then leave this commented out and script will use env var
password=password

# ============================================================================
# OPERATION (Required)
# ============================================================================

# Operation to perform: backup, restore, import, export
operation=restore

# ============================================================================
# RESTORE SETTINGS (Required for restore operation)
# ============================================================================

# Input file path (path to the backup .zip to restore from)
# The file MUST:
#   1. Be a .zip archive (created by backup operation)
#   2. Exist and be readable
#   3. Be from a compatible Pentaho version
#
# Examples:
#   Absolute: /backups/pentaho-full-system-backup.zip
#   Relative: backups/pentaho-full-system-backup.zip
#   Recent:   backups/pentaho-full-$(date -d '1 day ago' +%Y%m%d).zip
#
# Override on command line:
#   ./import-export-enhanced.sh --file-path=backups/backup-20240627.zip
file-path=./backups/pentaho-full-system-backup.zip

# ============================================================================
# RESTORE BEHAVIOR (Optional)
# ============================================================================

# OVERWRITE MODE: How to handle existing content
# 
# true  = REPLACE MODE (DELETE existing, restore from backup)
#   - Dangerous! Removes all current content before restoring
#   - Use only for: Disaster recovery, fresh restore
#   - WARNING: You WILL LOSE all content not in backup!
#
# false = MERGE MODE (Keep existing, add from backup)
#   - Safe! Preserves current content and adds from backup
#   - Use for: Incremental restore, import from other system
#   - No data loss, but conflicts may occur (see merge strategy below)
#
# Default: false (merge mode is safer)
overwrite=false

# ============================================================================
# ACL & SECURITY SETTINGS (Optional)
# ============================================================================

# APPLY ACL SETTINGS: Whether to restore permissions/security from backup
#
# true  = APPLY ACLs from backup
#   - Restores user/role assignments
#   - Restores resource permissions
#   - Overwrites current permissions
#
# false = SKIP ACLs (keep current permissions)
#   - Ignores permissions in backup
#   - Keeps existing permission settings
#   - Useful when restoring between different user bases
#
# Default: true (restore security settings too)
applyAclSettings=true

# OVERWRITE ACL SETTINGS: How to merge permissions
#
# Values when applyAclSettings=true:
#   merge   = Add from backup, don't remove existing
#             (SAFE - cumulative permissions)
#   replace = Replace with backup permissions
#             (RISKY - removes current, applies only backup)
#
# Values when applyAclSettings=false:
#   This setting is ignored (ACLs not applied)
#
# Default: merge (adds permissions, doesn't remove)
# Common choice: merge (safest for restore)
overwriteAclSettings=merge

# RETAIN OWNERSHIP: Whether to keep original user ownership
#
# true  = Keep original owner from backup
#   - Example: If backup has User "alice" as owner, restore keeps "alice"
#   - Fails if "alice" doesn't exist on restore server
#   - Good for: Exact restore, same user database
#
# false = Change ownership to current user
#   - Example: If restore user is "restoreadmin", they become owner
#   - Useful when: User doesn't exist on target system
#   - Good for: Restoring to different environment with different users
#
# Default: false (change ownership to restore user)
retainOwnership=false

# ============================================================================
# LOGGING SETTINGS (Optional)
# ============================================================================

# Log level: DEBUG, INFO, WARN, ERROR
# Use DEBUG for troubleshooting, INFO for normal operation
logLevel=INFO

# Log file path (optional)
# If not specified, logs go to console only
# Examples:
#   ./logs/pentaho-restore.log
#   $HOME/.pentaho-backup/logs/restore.log
logfile=./logs/pentaho-restore.log

# ============================================================================
# ADVANCED SETTINGS (Optional)
# ============================================================================

# Character set for file operations
# Usually UTF-8 (default) unless specific legacy requirement
# charset=UTF-8

################################################################################
#
# RESTORE STRATEGY GUIDE
#
################################################################################

# SCENARIO 1: DISASTER RECOVERY (Lost entire Pentaho instance)
# Goal: Restore everything exactly as it was
# Settings:
overwrite=true
applyAclSettings=true
overwriteAclSettings=replace
retainOwnership=true
#
# Command:
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --file-path=/backups/last-known-good.zip
#
# Result: Exact replica of backup point

# SCENARIO 2: INCREMENTAL RESTORE (Add backup content to existing system)
# Goal: Merge backup into running system (safe, no data loss)
# Settings:
overwrite=false
applyAclSettings=true
overwriteAclSettings=merge
retainOwnership=false
#
# Command:
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --file-path=/backups/backup-snapshot.zip
#
# Result: Adds backup content, keeps existing content

# SCENARIO 3: TEST RESTORE (Verify backup is restorable)
# Goal: Restore to test system without affecting production
# Settings:
overwrite=false
applyAclSettings=false
retainOwnership=false
#
# Command:
#   ./import-export-enhanced.sh --config test-restore.properties \
#     --url=http://test-pentaho:8080/pentaho \
#     --file-path=/backups/backup-to-test.zip
#
# Result: Test system with backup content, original permissions intact

# SCENARIO 4: MIGRATION (Restore to new Pentaho version)
# Goal: Move data to new system with different users
# Settings:
overwrite=false
applyAclSettings=true
overwriteAclSettings=merge
retainOwnership=false
#
# Command:
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --url=https://new-pentaho.company.com:8443/pentaho \
#     --username=newadmin \
#     --file-path=/backups/old-system-backup.zip
#
# Result: Old system data in new system with new admin permissions

################################################################################
#
# USAGE EXAMPLES
#
################################################################################

# Example 1: Simple restore (all settings from config)
#   ./import-export-enhanced.sh --config example-restore-full-system.properties

# Example 2: Restore from specific backup file
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --file-path=/backups/pentaho-full-20240627.zip

# Example 3: Restore to different server
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --url=https://other-pentaho.company.com:8443/pentaho \
#     --username=otheradmin

# Example 4: Merge mode (safe restore with existing data)
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --overwrite=false \
#     --applyAclSettings=true \
#     --overwriteAclSettings=merge

# Example 5: Replace mode (disaster recovery - careful!)
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --overwrite=true \
#     --applyAclSettings=true \
#     --overwriteAclSettings=replace

# Example 6: Dry-run (preview restore without executing)
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --dry-run

# Example 7: Verbose output for debugging
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --verbose

# Example 8: With environment variable for password (secure)
#   export PENTAHO_PASSWORD=secure_password_from_vault
#   ./import-export-enhanced.sh --config example-restore-full-system.properties

# Example 9: Restore latest backup from a directory
#   ./import-export-enhanced.sh --config example-restore-full-system.properties \
#     --file-path=$(ls -t /backups/pentaho-*.zip | head -1)

################################################################################
#
# SAFETY CHECKLIST BEFORE RESTORE
#
################################################################################

# [ ] Server is running and accessible
#     curl http://localhost:8080/pentaho
#
# [ ] Backup file exists and is readable
#     ls -lh /backups/pentaho-full-system-backup.zip
#
# [ ] You have a RECENT backup of current system
#     (In case restore causes issues and you need to rollback)
#     ls -lh /backups/backup-*.zip | head -5
#
# [ ] Username/password are correct
#     Try: ./import-export-enhanced.sh --url=http://localhost:8080/pentaho \
#          --username=admin --password=password --help
#
# [ ] Backup is from compatible Pentaho version
#     (Same major version, or migrating consciously)
#
# [ ] You understand overwrite= mode
#     true  = DESTRUCTIVE (delete current, restore from backup)
#     false = SAFE (merge backup with current)
#
# [ ] You've read the ACL settings and understand implications
#     applyAclSettings=true/false, overwriteAclSettings=merge/replace
#
# [ ] You have disk space (roughly 2-3x backup file size)
#     df -h /
#
# [ ] You understand retainOwnership setting
#     true  = Keep original owner (may fail if user gone)
#     false = Change ownership to restore user (safe)
#
# OPTIONAL BUT RECOMMENDED:
# [ ] Run a dry-run first
#     ./import-export-enhanced.sh --config example-restore-full-system.properties --dry-run
#
# [ ] Test on non-production system first
#     ./import-export-enhanced.sh --config test-restore.properties

################################################################################
#
# SECURITY NOTES
#
################################################################################

# 1. PASSWORD MANAGEMENT
#    ✓ Option A: Use environment variable (recommended)
#      export PENTAHO_PASSWORD=your_password
#      Then comment out the password= line above
#
#    ✓ Option B: File permissions (if in file)
#      chmod 600 example-restore-full-system.properties
#
#    ✓ Option C: Encrypted passwords (future feature)
#      Use encrypted[...] format when supported

# 2. FILE PERMISSIONS
#    - Config file contains credentials, protect it:
#      chmod 600 ~/.pentaho-backup/*.properties
#    - Backup file contains sensitive data, protect it:
#      chmod 600 /backups/*.zip

# 3. SECURE STORAGE
#    - Store config in secure location: ~/.pentaho-backup/
#    - Use Vault, Kubernetes Secrets, or environment variables
#    - Never commit config to version control with real passwords

# 4. BACKUP OF CURRENT STATE
#    - ALWAYS backup current system before restore!
#    - If restore fails, you can rollback:
#      ./import-export-enhanced.sh --config example-backup-full-system.properties \
#        --file-path=/backups/pre-restore-backup-$(date +%Y%m%d).zip

################################################################################
#
# TROUBLESHOOTING
#
################################################################################

# Problem: "Connection refused"
# Solution: Check url= parameter, ensure target Pentaho server is running
#   curl http://localhost:8080/pentaho

# Problem: "Authentication failed"
# Solution: Check username= and password= parameters for target server
#   Try accessing UI with same credentials: http://localhost:8080/pentaho

# Problem: "Permission denied"
# Solution: Username must have backup/restore permissions
#   Ask system admin to grant backup/restore role

# Problem: "File not found"
# Solution: Check file-path= parameter exists
#   ls -lh /backups/pentaho-full-system-backup.zip

# Problem: "Invalid backup file"
# Solution: Backup may be corrupted or from incompatible version
#   Try different backup: ls -lh /backups/*.zip
#   Check backup was successful: tail -100 /var/log/pentaho-backup.log

# Problem: "Ownership mismatch"
# Solution: User from backup doesn't exist on restore server
#   Option 1: Set retainOwnership=false (recommended)
#   Option 2: Create user on target system matching backup user
#   Option 3: Use applyAclSettings=false to skip permissions

# Problem: "Disk space full"
# Solution: Restore needs temp space (2-3x backup file size)
#   Check: df -h /
#   Clean up old backups: rm /backups/old-backup-*.zip

# For more details, run with verbose flag:
#   ./import-export-enhanced.sh --config example-restore-full-system.properties --verbose

