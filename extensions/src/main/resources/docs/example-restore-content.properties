################################################################################
#
# Pentaho Import-Export Configuration
# Sample: CONTENT_ONLY restore (repository files/folders)
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --restore --config=example-restore-content.properties
#
# Restore a specific archive without editing this file:
#   ./import-export.sh --restore --config=example-restore-content.properties \
#     --file-path=./backups/pentaho-content-backup.zip
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---------------------------------------------------------------------------
# Connection (required)
# ---------------------------------------------------------------------------
url=http://localhost:8080/pentaho
username=admin
# Password: generate an obfuscated value with the Pentaho tool, then paste it here:
#   ./encr.sh -kettle <yourPassword>      (encr.bat on Windows)
# The full "Encrypted ..." string is decrypted by the CLI before the REST call.
# Plaintext (password=yourPassword) still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---------------------------------------------------------------------------
# What to restore
# ---------------------------------------------------------------------------
# Limit the restore to content components only (overrides the manifest).
restore-profile=CONTENT_ONLY

# Restore scheduler-generated output (cached PDFs/CSVs, etc.) if present in the
# archive. Set to false to skip it.
include-generated-content=true

# The backup archive to restore from (must match a CONTENT_ONLY backup .zip)
file-path=./backups/pentaho-content-backup.zip

# ---------------------------------------------------------------------------
# Restore behaviour
# ---------------------------------------------------------------------------
# overwrite=true  -> replace files that already exist in the repository
# overwrite=false -> keep existing, only add what is missing
overwrite=true

# Apply the ACLs stored in the archive to the restored files
applyAclSettings=true

# Keep the original file ownership recorded in the archive
retainOwnership=true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logLevel=INFO
logfile=./logs/pentaho-content-restore.log
stream-logs=true
