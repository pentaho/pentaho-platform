################################################################################
#
# Pentaho Import-Export Configuration
# Sample: DATA_SOURCE restore (JDBC datasources, metadata, Mondrian)
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --restore --config=example-restore-datasource.properties
#
# Restore a specific archive without editing this file:
#   ./import-export.sh --restore --config=example-restore-datasource.properties \
#     --file-path=./backups/pentaho-datasource-backup.zip
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---------------------------------------------------------------------------
# Connection (required)
# ---------------------------------------------------------------------------
url=http://localhost:8080/pentaho
username=admin
# Password: generate an obfuscated value with the Pentaho tool, then paste it here:
#   ./encr.sh -kettle <yourPassword>      (encr.bat on Windows)
# The full "Encrypted ..." string is decrypted by the CLI before the REST call.
# Plaintext (password=yourPassword) still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---------------------------------------------------------------------------
# What to restore
# ---------------------------------------------------------------------------
# Limit the restore to datasource components only (overrides the manifest).
# DATA_SOURCE = JDBC datasources, metadata, and Mondrian definitions.
restore-profile=DATA_SOURCE

# The backup archive to restore from (must match a DATA_SOURCE backup .zip)
file-path=./backups/pentaho-datasource-backup.zip

# ---------------------------------------------------------------------------
# Restore behaviour
# ---------------------------------------------------------------------------
# overwrite=true  -> replace datasources that already exist with the ones in the backup
# overwrite=false -> keep existing, only add what is missing
overwrite=true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logLevel=INFO
logfile=./logs/pentaho-datasource-restore.log
stream-logs=true
