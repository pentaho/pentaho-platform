################################################################################
#
# Pentaho Import-Export Configuration
# Sample: CONTENT_ONLY backup (repository files/folders) WITHOUT generated content
#
# Excludes scheduler-generated output (cached PDFs/CSVs, etc.). This produces a
# smaller, cleaner backup and AVOIDS contention with the live scheduler, so it
# is the recommended way to back up content on a running server.
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --backup --config=example-backup-content-no-generated.properties
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---- Connection (required) ----
url=http://localhost:8080/pentaho
username=admin
# Encrypt with: ./encr.sh -kettle <yourPassword>  (paste the full "Encrypted ..." string).
# Plaintext still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---- What to back up ----
backup-profile=CONTENT_ONLY
# Exclude scheduler-generated output
include-generated-content=false
file-path=./backups/pentaho-content-no-generated-backup.zip

# ---- Logging ----
logLevel=INFO
logfile=./logs/pentaho-content-no-generated-backup.log
stream-logs=true
