################################################################################
#
# Pentaho Import-Export Configuration
# Sample: SECURITY restore (users, roles, ACLs)
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --restore --config=example-restore-security.properties
#
# Restore a specific archive without editing this file:
#   ./import-export.sh --restore --config=example-restore-security.properties \
#     --file-path=./backups/pentaho-security-backup.zip
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---------------------------------------------------------------------------
# Connection (required)
# ---------------------------------------------------------------------------
url=http://localhost:8080/pentaho
username=admin
# Password: generate an obfuscated value with the Pentaho tool, then paste it here:
#   ./encr.sh -kettle <yourPassword>      (encr.bat on Windows)
# The full "Encrypted ..." string is decrypted by the CLI before the REST call.
# Plaintext (password=yourPassword) still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---------------------------------------------------------------------------
# What to restore
# ---------------------------------------------------------------------------
# Limit the restore to security components only (overrides the manifest).
restore-profile=SECURITY

# The backup archive to restore from (must match a SECURITY backup .zip)
file-path=./backups/pentaho-security-backup.zip

# ---------------------------------------------------------------------------
# Restore behaviour
# ---------------------------------------------------------------------------
# overwrite=true  -> replace existing users/roles with the ones in the backup
# overwrite=false -> keep existing, only add what is missing
overwrite=true

# ACL handling (relevant when content/ACLs are part of the archive)
applyAclSettings=true
overwriteAclSettings=false

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logLevel=INFO
logfile=./logs/pentaho-security-restore.log
stream-logs=true
