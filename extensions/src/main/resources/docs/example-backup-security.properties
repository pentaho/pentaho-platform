################################################################################
#
# Pentaho Import-Export Configuration
# Sample: SECURITY backup (users, roles, ACLs)
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --backup --config=example-backup-security.properties
#
# Override anything per-run, e.g. a timestamped file:
#   ./import-export.sh --backup --config=example-backup-security.properties \
#     --file-path=./backups/security-$(date +%Y%m%d-%H%M%S).zip
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---------------------------------------------------------------------------
# Connection (required)
# ---------------------------------------------------------------------------
url=http://localhost:8080/pentaho
username=admin
# Password: generate an obfuscated value with the Pentaho tool, then paste it here:
#   ./encr.sh -kettle <yourPassword>      (encr.bat on Windows)
# The full "Encrypted ..." string is decrypted by the CLI before the REST call.
# Plaintext (password=yourPassword) still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---------------------------------------------------------------------------
# What to back up
# ---------------------------------------------------------------------------
# SECURITY = users and roles only (no content, datasources, schedules, etc.)
backup-profile=SECURITY

# Output archive (must end in .zip)
file-path=./backups/pentaho-security-backup.zip

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logLevel=INFO
logfile=./logs/pentaho-security-backup.log
# Stream server-side progress to the console so it does not look like a hang
stream-logs=true
