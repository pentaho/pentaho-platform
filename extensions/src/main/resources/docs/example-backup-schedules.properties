################################################################################
#
# Pentaho Import-Export Configuration
# Sample: SCHEDULES backup (scheduled jobs and triggers)
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --backup --config=example-backup-schedules.properties
#
# Timestamped output:
#   ./import-export.sh --backup --config=example-backup-schedules.properties \
#     --file-path=./backups/schedules-$(date +%Y%m%d-%H%M%S).zip
#
# NOTE: this profile covers jobs/triggers only. User email settings and groups
# are NOT included here - use the SETTINGS or FULL_SYSTEM profile for those.
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---- Connection (required) ----
url=http://localhost:8080/pentaho
username=admin
# Encrypt with: ./encr.sh -kettle <yourPassword>  (paste the full "Encrypted ..." string).
# Plaintext still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---- What to back up ----
# SCHEDULES = scheduled jobs and triggers only
backup-profile=SCHEDULES
file-path=./backups/pentaho-schedules-backup.zip

# ---- Logging ----
logLevel=INFO
logfile=./logs/pentaho-schedules-backup.log
stream-logs=true
