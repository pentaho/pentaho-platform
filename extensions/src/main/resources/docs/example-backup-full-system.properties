################################################################################
#
# Pentaho Import-Export Configuration
# Sample: Full System Backup
#
# Use with: ./import-export-enhanced.sh --config example-backup-full-system.properties
#
# Or create at: ~/.pentaho-backup/backup-full.properties
#
################################################################################

# ============================================================================
# CONNECTION SETTINGS (Required)
# ============================================================================

# Pentaho Server URL
# Examples:
#   Local: http://localhost:8080/pentaho
#   HTTPS: https://pentaho.company.com:8443/pentaho
#   Remote: http://192.168.1.100:8080/pentaho
url=http://localhost:8080/pentaho

# Administrative username
# Note: Must have backup/restore permissions
username=admin

# Administrative password
# SECURITY: Consider using environment variable instead:
#   export PENTAHO_PASSWORD=your_password
#   Then leave this commented out and script will use env var
password=password

# ============================================================================
# OPERATION (Required)
# ============================================================================

# Operation to perform: backup, restore, import, export
# This can be overridden on command line: ./import-export-enhanced.sh --restore
operation=backup

# ============================================================================
# BACKUP SETTINGS (Required for backup operation)
# ============================================================================

# Backup profile: What to backup
# Options:
#   FULL_SYSTEM       - Everything (all settings, content, data sources, schedules, security)
#   SECURITY          - Security settings only (roles, permissions, authentication)
#   CONTENT_ONLY      - Repository content only (dashboards, reports, files)
#   DATA_SOURCE       - Data sources only
#   SCHEDULES         - Schedules/jobs only
#   SETTINGS          - System settings only
#   INFRASTRUCTURE    - Infrastructure settings (Karaf configs, etc.)
backup-profile=FULL_SYSTEM

# Output file path for backup
# The file MUST be a .zip archive
# Supports:
#   Absolute path: /backups/pentaho-backup-full.zip
#   Relative path: backups/pentaho-backup-full.zip
#   With date:    backups/pentaho-full-$(date +%Y%m%d).zip
#
# Override on command line:
#   ./import-export-enhanced.sh --file-path=backups/backup-$(date +%Y%m%d).zip
file-path=./backups/pentaho-full-system-backup.zip

# ============================================================================
# LOGGING SETTINGS (Optional)
# ============================================================================

# Log level: DEBUG, INFO, WARN, ERROR
# Use DEBUG for troubleshooting, INFO for normal operation
logLevel=INFO

# Log file path (optional)
# If not specified, logs go to console only
# Examples:
#   ./logs/pentaho-backup.log
#   $HOME/.pentaho-backup/logs/backup.log
logfile=./logs/pentaho-backup.log

# ============================================================================
# ADVANCED SETTINGS (Optional)
# ============================================================================

# Include manifest file in backup
# Values: true (default) or false
# Manifest tracks what was backed up (useful for restore validation)
withManifest=true

# Character set for file operations
# Usually UTF-8 (default) unless specific legacy requirement
# charset=UTF-8

################################################################################
#
# USAGE EXAMPLES
#
################################################################################

# Example 1: Simple backup (all settings from config)
#   ./import-export-enhanced.sh --config example-backup-full-system.properties

# Example 2: Backup with timestamped filename
#   ./import-export-enhanced.sh --config example-backup-full-system.properties \
#     --file-path=/backups/pentaho-full-$(date +%Y%m%d-%H%M%S).zip

# Example 3: Backup to different server
#   ./import-export-enhanced.sh --config example-backup-full-system.properties \
#     --url=https://other-pentaho.company.com:8443/pentaho \
#     --username=otheruser \
#     --password=$OTHER_PASSWORD

# Example 4: Dry-run (preview command without executing)
#   ./import-export-enhanced.sh --config example-backup-full-system.properties \
#     --dry-run

# Example 5: Verbose output for debugging
#   ./import-export-enhanced.sh --config example-backup-full-system.properties \
#     --verbose

# Example 6: With environment variable for password (secure)
#   export PENTAHO_PASSWORD=secure_password_from_vault
#   ./import-export-enhanced.sh --config example-backup-full-system.properties

# Example 7: Different log level
#   ./import-export-enhanced.sh --config example-backup-full-system.properties \
#     --logLevel=DEBUG

# Example 8: Cron job (automatic daily backup)
#   # In /etc/cron.d/pentaho-backup:
#   0 2 * * * /opt/pentaho/import-export-enhanced.sh \
#     --config /etc/pentaho/backup-full.properties \
#     --file-path=/backups/pentaho-$(date +\%Y\%m\%d).zip

# Example 9: Systemd timer (modern approach)
#   # /etc/systemd/system/pentaho-backup.service
#   [Unit]
#   Description=Pentaho Full System Backup
#   
#   [Service]
#   Type=oneshot
#   ExecStart=/opt/pentaho/import-export-enhanced.sh \
#     --config /etc/pentaho/backup-full.properties \
#     --file-path=/backups/pentaho-$(date +\%Y\%m\%d).zip
#   User=pentaho
#   StandardOutput=journal
#   StandardError=journal

################################################################################
#
# SECURITY NOTES
#
################################################################################

# 1. PASSWORD MANAGEMENT
#    ✓ Option A: Use environment variable (recommended)
#      export PENTAHO_PASSWORD=your_password
#      Then comment out the password= line above
#
#    ✓ Option B: File permissions (if in file)
#      chmod 600 example-backup-full-system.properties
#
#    ✓ Option C: Encrypted passwords (future feature)
#      Use encrypted[...] format when supported

# 2. FILE PERMISSIONS
#    - Config file contains credentials, protect it:
#      chmod 600 ~/.pentaho-backup/*.properties
#    - Backup file contains sensitive data, protect it:
#      chmod 600 /backups/*.zip

# 3. SECURE STORAGE
#    - Store config in secure location: ~/.pentaho-backup/
#    - Use Vault, Kubernetes Secrets, or environment variables
#    - Never commit config to version control with real passwords

# 4. AUDIT & LOGGING
#    - logfile records what was backed up
#    - Monitor backup completion: tail -f /var/log/pentaho-backup.log
#    - Verify file integrity after backup

################################################################################
#
# TROUBLESHOOTING
#
################################################################################

# Problem: "Connection refused"
# Solution: Check url= parameter, ensure Pentaho server is running
#   curl http://localhost:8080/pentaho

# Problem: "Authentication failed"
# Solution: Check username= and password= parameters
#   Try accessing UI with same credentials: http://localhost:8080/pentaho

# Problem: "Permission denied"
# Solution: Username must have AdministerSecurityAction permission
#   Ask system admin to grant backup/restore role

# Problem: ".zip extension required"
# Solution: file-path= must end with .zip
#   ✓ /backups/backup.zip
#   ✗ /backups/backup.tar.gz

# Problem: Large backup fails
# Solution: Increase heap memory for Java process
#   export _PENTAHO_JAVA_HOME=$JAVA_HOME
#   export PENTAHO_DI_JAVA_OPTIONS="-Xmx4g"

# For more details, run with verbose flag:
#   ./import-export-enhanced.sh --config example-backup-full-system.properties --verbose

