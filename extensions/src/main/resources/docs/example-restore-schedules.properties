################################################################################
#
# Pentaho Import-Export Configuration
# Sample: SCHEDULES restore (scheduled jobs and triggers)
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --restore --config=example-restore-schedules.properties
#
# Restore a specific archive without editing this file:
#   ./import-export.sh --restore --config=example-restore-schedules.properties \
#     --file-path=./backups/pentaho-schedules-backup.zip
#
# NOTE: this profile covers jobs/triggers only. User email settings and groups
# are NOT included here - use the SETTINGS or FULL_SYSTEM profile for those.
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---------------------------------------------------------------------------
# Connection (required)
# ---------------------------------------------------------------------------
url=http://localhost:8080/pentaho
username=admin
# Password: generate an obfuscated value with the Pentaho tool, then paste it here:
#   ./encr.sh -kettle <yourPassword>      (encr.bat on Windows)
# The full "Encrypted ..." string is decrypted by the CLI before the REST call.
# Plaintext (password=yourPassword) still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---------------------------------------------------------------------------
# What to restore
# ---------------------------------------------------------------------------
# Limit the restore to scheduled jobs and triggers only (overrides the manifest).
restore-profile=SCHEDULES

# The backup archive to restore from (must match a SCHEDULES backup .zip)
file-path=./backups/pentaho-schedules-backup.zip

# ---------------------------------------------------------------------------
# Restore behaviour
# ---------------------------------------------------------------------------
# overwrite=true  -> replace schedules that already exist
# overwrite=false -> keep existing, only add what is missing
overwrite=true

# Apply the ACLs stored in the archive to the restored items
applyAclSettings=true

# Keep the original ownership recorded in the archive
retainOwnership=true

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logLevel=INFO
logfile=./logs/pentaho-schedules-restore.log
stream-logs=true
