################################################################################
#
# Pentaho Import-Export Configuration
# Sample: DATA_SOURCE backup (JDBC datasources, metadata, Mondrian)
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --backup --config=example-backup-datasource.properties
#
# Timestamped output:
#   ./import-export.sh --backup --config=example-backup-datasource.properties \
#     --file-path=./backups/datasource-$(date +%Y%m%d-%H%M%S).zip
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---- Connection (required) ----
url=http://localhost:8080/pentaho
username=admin
# Encrypt with: ./encr.sh -kettle <yourPassword>  (paste the full "Encrypted ..." string).
# Plaintext still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---- What to back up ----
# DATA_SOURCE = JDBC datasources, metadata, and Mondrian definitions
backup-profile=DATA_SOURCE
file-path=./backups/pentaho-datasource-backup.zip

# ---- Logging ----
logLevel=INFO
logfile=./logs/pentaho-datasource-backup.log
stream-logs=true
