################################################################################
#
# Pentaho Import-Export Configuration
# Sample: CONTENT_ONLY backup (repository files/folders) WITH generated content
#
# "Generated content" = scheduler output (e.g. generated PDFs/CSVs) cached in
# the repository. Including it makes a complete content backup.
#
# Run with (operation flag MUST be on the command line):
#   ./import-export.sh --backup --config=example-backup-content.properties
#
# NOTE: backing up generated content can race with the live scheduler writing
# new output. Run when schedules are idle, or use the "no-generated" variant.
#
# Precedence: command line > this config file > PENTAHO_* environment variables
#
################################################################################

# ---- Connection (required) ----
url=http://localhost:8080/pentaho
username=admin
# Encrypt with: ./encr.sh -kettle <yourPassword>  (paste the full "Encrypted ..." string).
# Plaintext still works. The value below decodes to: password
password=Encrypted 2be98afc86aa7f2e4bb18bd63c99dbdde

# ---- What to back up ----
backup-profile=CONTENT_ONLY
# Include scheduler-generated output (default behaviour for this profile)
include-generated-content=true
file-path=./backups/pentaho-content-backup.zip

# ---- Logging ----
logLevel=INFO
logfile=./logs/pentaho-content-backup.log
stream-logs=true
